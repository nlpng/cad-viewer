<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CAD Viewer</title>
  <link rel="stylesheet" href="css/style.css" />
  <script type="importmap">
  {
    "imports": {
      "three": "./vendor/three/build/three.module.js",
      "three/addons/": "./vendor/three/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <!-- hidden native pickers -->
  <input id="file-input" type="file" multiple hidden
         accept=".glb,.gltf,.dae,.fbx,.obj,.stl,.ply,.stp,.step,.igs,.iges" />
  <input id="folder-input" type="file" webkitdirectory multiple hidden />

  <div id="app">
    <!-- ░░ sidebar ░░ -->
    <aside id="sidebar">
      <div class="brand">
        <span class="logo" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="22" height="22"><path d="M12 2 3 7v10l9 5 9-5V7z" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/><path d="M3 7l9 5 9-5M12 12v10" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/></svg>
        </span>
        <div>
          <h1>CAD Viewer</h1>
          <p class="sub">local · offline · three.js</p>
        </div>
      </div>

      <div class="open-actions">
        <button id="btn-open-folder" class="btn btn-primary">
          <svg viewBox="0 0 24 24" width="16" height="16"><path d="M3 6a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/></svg>
          Open folder
        </button>
        <button id="btn-open-files" class="btn">
          <svg viewBox="0 0 24 24" width="16" height="16"><path d="M14 3v5h5M7 3h8l4 4v12a1 1 0 0 1-1 1H7a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1z" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/></svg>
          Open files
        </button>
      </div>

      <div class="search-wrap">
        <svg viewBox="0 0 24 24" width="15" height="15" class="search-ico"><circle cx="11" cy="11" r="7" fill="none" stroke="currentColor" stroke-width="1.6"/><path d="m20 20-3.5-3.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
        <input id="search" type="text" placeholder="Filter models…" autocomplete="off" />
      </div>

      <div class="list-head">
        <span id="file-count">No models loaded</span>
        <button id="clear-list" class="link" hidden>Clear</button>
      </div>

      <ul id="file-list" class="file-list"></ul>

      <div id="selection-bar" class="selection-bar" hidden>
        <span id="selected-count">0 selected</span>
        <button id="load-selected" class="btn btn-primary btn-sm">Load together</button>
      </div>

      <section id="parts-panel" class="parts-panel" hidden>
        <div class="list-head"><span>Parts</span></div>
        <ul id="parts-list" class="parts-list"></ul>
      </section>

      <p class="formats">GLB · GLTF · DAE · FBX · OBJ · STL · PLY · STEP · IGES</p>
    </aside>

    <!-- ░░ viewport ░░ -->
    <main id="viewport">
      <canvas id="canvas"></canvas>

      <!-- stats chip -->
      <div id="stats" class="stats" hidden></div>

      <!-- floating toolbar -->
      <div id="toolbar" class="toolbar" hidden>
        <button id="tb-fit" class="tb" title="Fit to view (F)">
          <svg viewBox="0 0 24 24" width="18" height="18"><path d="M4 9V5a1 1 0 0 1 1-1h4M20 9V5a1 1 0 0 0-1-1h-4M4 15v4a1 1 0 0 0 1 1h4M20 15v4a1 1 0 0 1-1 1h-4" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg>
        </button>
        <button id="tb-wire" class="tb" title="Wireframe">
          <svg viewBox="0 0 24 24" width="18" height="18"><path d="M12 2 3 7v10l9 5 9-5V7zM3 7l9 5 9-5M12 12v10M3 17l9-5 9 5M3 7l9 5M21 7l-9 5" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/></svg>
        </button>
        <button id="tb-grid" class="tb is-on" title="Grid">
          <svg viewBox="0 0 24 24" width="18" height="18"><path d="M3 9h18M3 15h18M9 3v18M15 3v18" fill="none" stroke="currentColor" stroke-width="1.5"/></svg>
        </button>
        <button id="tb-axes" class="tb is-on" title="Axes">
          <svg viewBox="0 0 24 24" width="18" height="18"><path d="M5 19V5M5 19h14M5 5l-2 3M5 5l2 3M19 19l-3-2M19 19l-3 2" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <label class="tb tb-color" title="Background">
          <svg viewBox="0 0 24 24" width="18" height="18"><path d="M12 3a9 9 0 1 0 0 18c1.5 0 2-1 2-2 0-1.5 1-2 2-2h1a4 4 0 0 0 4-4c0-4.5-4-8-9-8z" fill="none" stroke="currentColor" stroke-width="1.5"/></svg>
          <input id="tb-bg" type="color" value="#0e1116" />
        </label>
      </div>

      <!-- empty state -->
      <div id="empty" class="empty">
        <div class="empty-card">
          <div class="empty-ico">
            <svg viewBox="0 0 24 24" width="46" height="46"><path d="M12 16V4m0 0L8 8m4-4 4 4" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/><path d="M4 16v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
          </div>
          <h2>Drop a model to view</h2>
          <p>Drag &amp; drop files or a folder anywhere here — or pick one.</p>
          <div class="empty-actions">
            <button id="empty-open-folder" class="btn btn-primary">Open folder</button>
            <button id="empty-open-files" class="btn">Open files</button>
          </div>
        </div>
      </div>

      <!-- drag veil -->
      <div id="drop-veil" class="drop-veil" hidden><span>Release to load</span></div>

      <!-- loading overlay -->
      <div id="overlay" class="overlay" hidden>
        <div class="spinner"></div>
        <div id="overlay-name" class="overlay-name">Loading…</div>
        <div class="progress"><div id="overlay-bar" class="progress-bar"></div></div>
        <div id="overlay-pct" class="overlay-pct"></div>
      </div>
    </main>
  </div>

  <div id="toast" class="toast" hidden></div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
